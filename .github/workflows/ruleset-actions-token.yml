name: Ruleset Actions token boundary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-attempt:
    runs-on: ubuntu-latest
    steps:
      - name: Check out protected test branch
        uses: actions/checkout@v4
        with:
          ref: bounty-ruleset-test
      - name: Attempt protected branch update with GITHUB_TOKEN
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          printf "actions token ruleset attempt %s\n" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> actions-token-ruleset-attempt.txt
          git add actions-token-ruleset-attempt.txt
          git commit -m "Validate Actions token ruleset boundary"
          git push origin HEAD:bounty-ruleset-test